{% extends "base.html" %}
{% block title %}Update Node – GUA SPORT{% endblock %}

{% block content %}
<div class="bg-white min-h-screen pb-24 pt-8 sm:pt-12 relative overflow-hidden">
  
  <div class="absolute inset-0 flex items-center justify-center opacity-[0.02] pointer-events-none select-none z-0">
    <span class="text-[30vw] font-black uppercase tracking-tighter">DATA</span>
  </div>

  <div class="max-w-[1000px] mx-auto px-4 sm:px-6 lg:px-8 relative z-10">

    <a href="/profile/" class="inline-flex items-center gap-3 text-[11px] font-black text-stone-400 uppercase tracking-[0.2em] hover:text-black transition-colors mb-10 sm:mb-16 group">
      <div class="w-8 h-8 border-2 border-stone-200 flex items-center justify-center group-hover:border-black transition-colors bg-white">
        <svg class="w-4 h-4 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/></svg>
      </div>
      Trở về Data Node
    </a>

    <div class="mb-12 pb-6 border-b-[3px] border-black text-left">
      <h1 class="text-5xl md:text-7xl font-black text-black uppercase tracking-tighter leading-none transform -skew-x-6">
        Update <span class="stroke-black text-transparent">Node</span>
      </h1>
      <p class="text-[11px] font-black text-stone-400 uppercase tracking-[0.4em] mt-4 ml-1">Đồng bộ dữ liệu định danh</p>
    </div>

    <div class="max-w-2xl bg-white border-[4px] border-black p-8 md:p-12 shadow-[12px_12px_0px_0px_rgba(0,0,0,1)]">
      <form method="post" class="space-y-10">
        
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="group">
          <label class="block text-[11px] font-black text-black uppercase tracking-widest mb-2 ml-1">
            Định Danh (Full Name)
          </label>
          <input type="text" name="full_name" value="{{ user.full_name }}" required
            class="w-full bg-transparent border-b-2 border-stone-200 py-4 px-1 text-[16px] font-bold outline-none transition-all focus:border-black placeholder:text-stone-300" 
            placeholder="Nhập tên định danh hệ thống" />
        </div>

        <div class="group">
          <div class="flex items-center justify-between mb-2 ml-1">
            <label class="block text-[11px] font-black text-stone-400 uppercase tracking-widest">
              ID Mạng Lưới (Email)
            </label>
            <span class="text-[9px] font-black text-white bg-black uppercase tracking-widest px-2 py-1">
              Cố Định
            </span>
          </div>
          <input type="email" value="{{ user.email }}" disabled
            class="w-full bg-stone-50 border-b-2 border-stone-200 py-4 px-3 text-[16px] font-bold text-stone-400 outline-none cursor-not-allowed border-dashed" />
          
          <p class="text-[10px] font-mono font-bold text-stone-400 mt-3 ml-1 uppercase tracking-widest flex items-center gap-2">
            <span class="w-2 h-2 bg-red-500 border border-black animate-pulse"></span>
            SYS_LOCK: ID mạng lưới đã được mã hóa không thể thay đổi.
          </p>
        </div>

        <div class="pt-6">
          <button type="submit" 
            class="w-full sm:w-auto min-w-[240px] bg-black text-white border-2 border-black py-5 px-10 font-black uppercase tracking-[0.2em] text-[13px] hover:bg-white hover:text-black active:translate-y-1 transition-all flex items-center justify-center gap-3 group shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] hover:shadow-none">
            Đồng bộ dữ liệu
            <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3"/></svg>
          </button>
        </div>

      </form>
    </div>

  </div>
</div>
{% endblock %}
