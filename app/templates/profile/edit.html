{% extends "base.html" %}
{% block title %}Chỉnh sửa thông tin – GUA SPORT{% endblock %}

{% block content %}
<div class="bg-white min-h-screen pb-24 pt-8 sm:pt-12">
  <div class="max-w-[1000px] mx-auto px-4 sm:px-6 lg:px-8">

    <a href="/profile/" class="inline-flex items-center gap-2 text-[12px] font-black text-stone-400 uppercase tracking-widest hover:text-black transition-colors mb-8 sm:mb-12 group">
      <div class="w-8 h-8 rounded-full border-2 border-stone-200 flex items-center justify-center group-hover:border-black transition-colors">
        <svg class="w-4 h-4 group-hover:-translate-x-0.5 transition-transform" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/></svg>
      </div>
      Tài khoản
    </a>

    <div class="mb-10 pb-6 border-b-[3px] border-black">
      <h1 class="text-[36px] md:text-[56px] font-black text-black uppercase tracking-tighter leading-none">
        Chỉnh sửa<br />thông tin
      </h1>
    </div>

    <div class="max-w-2xl">
      <form method="post" class="space-y-8">
        
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div>
          <label class="block text-[14px] font-black text-black uppercase tracking-widest mb-3 ml-1">
            Họ và tên
          </label>
          <input type="text" name="full_name" value="{{ user.full_name }}" required
            class="w-full bg-[#F2F2F7] border-2 border-transparent text-black rounded-[18px] px-6 py-4 text-[16px] font-bold outline-none focus:bg-white focus:border-black transition-all placeholder:text-stone-400" placeholder="Nhập họ tên của bạn" />
        </div>

        <div>
          <div class="flex items-baseline gap-3 mb-3 ml-1">
            <label class="block text-[14px] font-black text-stone-400 uppercase tracking-widest">
              Email
            </label>
            <span class="text-[11px] font-bold text-stone-400 uppercase tracking-wide border border-stone-200 px-2 py-0.5 rounded-md">
              Cố định
            </span>
          </div>
          <input type="email" value="{{ user.email }}" disabled
            class="w-full bg-stone-50 border-2 border-stone-200 text-stone-400 rounded-[18px] px-6 py-4 text-[16px] font-bold outline-none cursor-not-allowed" />
          <p class="text-[13px] font-bold text-stone-400 mt-3 ml-1 flex items-center gap-1.5">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/></svg>
            Email được dùng để định danh, không thể thay đổi.
          </p>
        </div>

        <div class="pt-6 border-t border-stone-200">
          <button type="submit" class="w-full sm:w-auto min-w-[240px] bg-black text-white py-5 px-10 rounded-full font-black uppercase tracking-[0.1em] text-[15px] hover:bg-stone-800 active:scale-[0.98] transition-all flex items-center justify-center gap-3 group shadow-xl shadow-black/10">
            Lưu thay đổi
            <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3"/></svg>
          </button>
        </div>

      </form>
    </div>

  </div>
</div>
{% endblock %}
