{% extends "base.html" %}
{% block title %}Cập nhật hồ sơ | GUA Maison{% endblock %}

{% block content %}
<div class="bg-stone-50 min-h-screen pb-24 pt-8 sm:pt-12 font-sans">
  <div class="max-w-[800px] mx-auto px-4 sm:px-6 lg:px-8">

    <a href="/profile/" class="inline-flex items-center gap-2 text-xs font-semibold text-stone-500 hover:text-stone-900 transition-colors mb-8 group reveal">
      <svg class="w-4 h-4 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/>
      </svg>
      Trở về hồ sơ cá nhân
    </a>

    <div class="mb-10 reveal">
      <h1 class="text-3xl md:text-4xl font-bold tracking-tight text-stone-900 mb-2">
        Cập nhật hồ sơ
      </h1>
      <div class="flex items-center gap-2">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
        <p class="text-sm font-medium text-stone-500">Đồng bộ dữ liệu cá nhân</p>
      </div>
    </div>

    <div class="bg-white rounded-3xl shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-stone-100 p-8 md:p-12 relative overflow-hidden reveal" style="transition-delay: 100ms;">

      <div class="absolute -top-20 -right-20 w-64 h-64 bg-stone-50 rounded-full blur-3xl pointer-events-none"></div>

      <form method="post" class="space-y-8 relative z-10">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div>
          <label class="block text-xs font-semibold text-stone-600 mb-2 uppercase tracking-wider">
            Họ và tên
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <svg class="w-4 h-4 text-stone-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
            </div>
            <input type="text" name="full_name" value="{{ user.full_name }}" required
              class="w-full text-sm text-stone-800 border border-stone-200 rounded-xl pl-11 pr-4 py-3.5 outline-none focus:border-stone-400 focus:ring-1 focus:ring-stone-400 transition-all bg-stone-50/50 focus:bg-white placeholder:text-stone-400 font-medium"
              placeholder="Nhập tên của bạn" />
          </div>
        </div>

        <div>
          <div class="flex items-center justify-between mb-2">
            <label class="block text-xs font-semibold text-stone-600 uppercase tracking-wider">
              Địa chỉ Email
            </label>
            <span class="text-[10px] font-bold text-stone-500 bg-stone-100 uppercase tracking-widest px-2.5 py-1 rounded-md border border-stone-200/60">
              Cố định
            </span>
          </div>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <svg class="w-4 h-4 text-stone-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
            </div>
            <input type="email" value="{{ user.email }}" disabled
              class="w-full text-sm text-stone-500 border border-stone-200 border-dashed rounded-xl pl-11 pr-4 py-3.5 outline-none cursor-not-allowed bg-stone-50 font-medium" />
          </div>
          <p class="text-[11px] font-medium text-stone-400 mt-2.5 flex items-start gap-1.5">
            <svg class="w-3.5 h-3.5 mt-0.5 shrink-0 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"></path></svg>
            Email định danh hệ thống không thể thay đổi để đảm bảo bảo mật.
          </p>
        </div>

        <div class="pt-4 border-t border-stone-100">
          <button type="submit"
            class="w-full sm:w-auto min-w-[200px] bg-stone-900 text-white rounded-xl py-3.5 px-8 font-bold text-sm hover:bg-stone-700 active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-md hover:shadow-lg">
            Lưu thay đổi
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
          </button>
        </div>

      </form>
    </div>

  </div>
</div>

<style>
  .reveal {
    animation: revealUp 0.7s ease-out forwards;
    opacity: 0;
  }
  @keyframes revealUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
{% endblock %}
