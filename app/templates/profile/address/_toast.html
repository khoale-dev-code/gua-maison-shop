{# address/_toast.html #}
<div id="gua-toast" role="status" aria-live="polite" aria-atomic="true"
  class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[70]
         flex items-center gap-2.5 px-4 py-3 rounded-xl shadow-xl
         text-sm font-medium whitespace-nowrap pointer-events-none
         opacity-0 translate-y-2 transition-all duration-300">
  <svg id="toast-icon" class="size-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true"></svg>
  <span id="toast-msg"></span>
</div>
