{# address/_delete_dialog.html
   Custom confirm dialog — replaces browser confirm() which can be blocked #}
<div id="delete-dialog"
  role="alertdialog" aria-modal="true" aria-labelledby="del-title" aria-describedby="del-desc"
  aria-hidden="true"
  style="display:none"
  class="fixed inset-0 z-[60] flex items-center justify-center px-4">

  {# Backdrop #}
  <div class="absolute inset-0 bg-stone-900/50 opacity-0 transition-opacity duration-200" id="del-backdrop"></div>

  {# Panel #}
  <div id="del-panel"
    class="relative w-full max-w-sm bg-white rounded-2xl shadow-2xl
           opacity-0 scale-95 transition-all duration-200 p-6">

    {# Icon #}
    <div class="size-11 mx-auto mb-4 rounded-full bg-red-50 flex items-center justify-center">
      <svg class="size-5 text-red-500" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"/>
      </svg>
    </div>

    <h3 id="del-title" class="text-base font-bold text-stone-900 text-center mb-1">Xoá địa chỉ?</h3>
    <p id="del-desc" class="text-sm text-stone-500 text-center mb-6">
      Địa chỉ của <strong id="del-name" class="text-stone-700 font-semibold"></strong> sẽ bị xoá vĩnh viễn.
    </p>

    <div class="flex gap-3">
      <button type="button" onclick="GUA.deleteDialog.cancel()"
        class="flex-1 h-10 rounded-xl border border-stone-200 text-sm font-semibold text-stone-700
               hover:bg-stone-50 transition-colors">
        Huỷ
      </button>
      <button type="button" onclick="GUA.deleteDialog.confirm()"
        class="flex-1 h-10 rounded-xl bg-red-600 text-sm font-semibold text-white
               hover:bg-red-700 active:scale-[.98] transition-all">
        Xoá địa chỉ
      </button>
    </div>
  </div>
</div>

{# Hidden delete form — submitted programmatically #}
<form id="delete-form" method="POST" style="display:none">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
</form>
