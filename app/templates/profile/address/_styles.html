{# address/_styles.html — Scoped styles, Tailwind v4 compatible (no @apply) #}
<style>
/* Hide scrollbar — mobile tab nav */
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
.no-scrollbar::-webkit-scrollbar { display: none; }

/* ── Form inputs (Chuẩn Minimalism: Viền mỏng, vuông vức) ── */
.gua-input {
  display: block;
  width: 100%;
  height: 3rem; /* 48px - Chuẩn kích thước chạm (touch target) trên Mobile */
  padding: 0 1rem;
  border-radius: 0.125rem; /* Bo góc cực nhẹ (2px) */
  border: 1px solid #e5e5e5;
  font-size: 0.875rem;
  font-weight: 500;
  color: #000000;
  background-color: #ffffff;
  outline: none;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
.gua-input::placeholder { color: #a3a3a3; font-weight: 400; }
.gua-input:hover:not(:disabled) { border-color: #a3a3a3; }
.gua-input:focus { 
  border-color: #000000; 
  background-color: #ffffff; 
  box-shadow: inset 0 0 0 1px #000000; /* Viền trong sắc nét thay vì shadow nhòe */
}
.gua-input:disabled { background-color: #f5f5f5; color: #a3a3a3; cursor: not-allowed; }

/* FIX: Hiển thị lỗi sau khi người dùng nhập sai */
.gua-input:not(:placeholder-shown):invalid {
  border-color: #ef4444;
  box-shadow: inset 0 0 0 1px #ef4444;
}

/* ── Selects ── */
.gua-select {
  display: block;
  width: 100%;
  height: 3rem;
  padding: 0 2.5rem 0 1rem;
  border-radius: 0.125rem;
  border: 1px solid #e5e5e5;
  font-size: 0.875rem;
  font-weight: 500;
  color: #000000;
  background-color: #ffffff;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
.gua-select:hover:not(:disabled) { border-color: #a3a3a3; }
.gua-select:focus { 
  border-color: #000000; 
  box-shadow: inset 0 0 0 1px #000000; 
}
.gua-select:disabled { opacity: 0.6; cursor: not-allowed; background-color: #f5f5f5; }

/* ── Chevron overlay on selects (Mũi tên xoay khi focus) ── */
.gua-chevron {
  position: absolute;
  right: 1rem;
  top: 50%;
  transform: translateY(-50%);
  width: 1rem;
  height: 1rem;
  color: #737373;
  pointer-events: none;
  transition: transform 0.3s ease, color 0.3s ease;
}
.gua-select:focus + .gua-chevron { 
  transform: translateY(-50%) rotate(180deg); 
  color: #000000; 
}

/* ── Modal Base Transitions ── */
#addr-modal, #delete-dialog { display: none; }
#addr-modal.is-open, #delete-dialog.is-open { display: flex !important; }

/* Modal Backdrops */
#modal-backdrop, #del-backdrop {
  opacity: 0;
  background-color: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(2px);
  transition: opacity 0.3s ease-out;
}
#addr-modal.is-open #modal-backdrop, 
#delete-dialog.is-open #del-backdrop { opacity: 1; }

/* Modal Panels */
#modal-panel, #del-panel {
  opacity: 0;
  transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1); /* Gia tốc mượt mà của Apple */
}

/* 📱 RESPONSIVE MOBILE: Trượt từ dưới lên (Bottom Sheet) */
@media (max-width: 767px) {
  #modal-panel, #del-panel {
    transform: translateY(100%);
    margin-top: auto; /* Đẩy panel xuống sát đáy màn hình */
    border-bottom-left-radius: 0 !important;
    border-bottom-right-radius: 0 !important;
    width: 100%;
  }
  #addr-modal.is-open #modal-panel,
  #delete-dialog.is-open #del-panel {
    transform: translateY(0);
    opacity: 1;
  }
}

/* 💻 RESPONSIVE DESKTOP: Hiện ở giữa màn hình (Center Pop-up) */
@media (min-width: 768px) {
  #modal-panel, #del-panel {
    transform: scale(0.95) translateY(10px);
    margin: auto;
  }
  #addr-modal.is-open #modal-panel,
  #delete-dialog.is-open #del-panel {
    transform: scale(1) translateY(0);
    opacity: 1;
  }
}

/* ── Address card hover lift ── */
.addr-card { 
  will-change: transform, box-shadow; 
  transition: all 0.3s ease;
  border: 1px solid #e5e5e5;
}
.addr-card:hover {
  border-color: #000000;
  box-shadow: 0 8px 24px -4px rgba(0, 0, 0, 0.05);
  transform: translateY(-2px);
}
</style>
