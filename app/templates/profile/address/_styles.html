{# address/_styles.html — Scoped styles, Tailwind v4 compatible (no @apply) #}
<style>
/* Hide scrollbar — mobile tab nav */
.no-scrollbar { scrollbar-width: none; }
.no-scrollbar::-webkit-scrollbar { display: none; }

/* ── Form inputs ── */
.gua-input {
  display: block;
  width: 100%;
  height: 2.625rem;
  padding: 0 0.75rem;
  border-radius: 0.5rem;
  border: 1px solid #e7e5e4;
  font-size: 0.875rem;
  font-weight: 500;
  color: #1c1917;
  background-color: #fafaf9;
  outline: none;
  transition: border-color .15s, box-shadow .15s, background-color .15s;
}
.gua-input::placeholder { color: #a8a29e; font-weight: 400; }
.gua-input:hover  { border-color: #d6d3d1; }
.gua-input:focus  { border-color: #1c1917; background-color: #fff; box-shadow: 0 0 0 3px rgb(28 25 23 / .08); }
/* FIX: Show invalid state after user interaction */
.gua-input:not(:placeholder-shown):invalid {
  border-color: #ef4444;
  box-shadow: 0 0 0 3px rgb(239 68 68 / .08);
}

/* ── Selects ── */
.gua-select {
  display: block;
  width: 100%;
  height: 2.625rem;
  padding: 0 2rem 0 0.75rem;
  border-radius: 0.5rem;
  border: 1px solid #e7e5e4;
  font-size: 0.875rem;
  font-weight: 500;
  color: #1c1917;
  background-color: #fafaf9;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
  cursor: pointer;
  transition: border-color .15s, box-shadow .15s;
}
.gua-select:hover:not(:disabled) { border-color: #d6d3d1; }
.gua-select:focus  { border-color: #1c1917; box-shadow: 0 0 0 3px rgb(28 25 23 / .08); }
.gua-select:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Chevron overlay on selects ── */
.gua-chevron {
  position: absolute;
  right: 0.625rem;
  top: 50%;
  transform: translateY(-50%);
  width: 1rem;
  height: 1rem;
  color: #a8a29e;
  pointer-events: none;
}

/* ── Modal transitions via is-open class ── */
#addr-modal.is-open { display: flex !important; }
#addr-modal.is-open #modal-backdrop { opacity: 1; }
#addr-modal.is-open #modal-panel { opacity: 1; transform: translateY(0); }

/* ── Delete dialog transitions ── */
#delete-dialog.is-open { display: flex !important; }
#delete-dialog.is-open #del-backdrop { opacity: 1; }
#delete-dialog.is-open #del-panel { opacity: 1; transform: scale(1); }

/* ── Address card hover lift ── */
.addr-card { will-change: box-shadow; }
</style>
