  <section class="bg-white relative border-t border-neutral-200">
    
    <div class="px-4 md:px-8 py-5 flex items-center justify-center relative border-b border-neutral-200">
      <h2 class="text-base md:text-xl font-black uppercase tracking-[0.15em] text-black">
        New Arrivals
      </h2>
      
      <div class="absolute right-4 md:right-8 flex items-center gap-4 text-black">
        <button id="btnPrevFeatured" class="hover:text-neutral-400 transition-colors p-1">
          <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>
        </button>
        <span class="hidden md:block text-[10px] font-bold tracking-[0.2em] uppercase text-neutral-400">Trượt</span>
        <button id="btnNextFeatured" class="hover:text-neutral-400 transition-colors p-1">
          <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" /></svg>
        </button>
      </div>
    </div>

    <div id="featured-slider" class="flex overflow-x-auto no-scrollbar cursor-grab active:cursor-grabbing select-none scroll-smooth">
      
      {% for product in featured_products %}
      <div class="flex-shrink-0 w-[80vw] sm:w-[45vw] md:w-[32vw] lg:w-[22vw] group border-r border-neutral-200 flex flex-col bg-white">
        
        <a href="/product/{{ product.slug or product.id }}" class="block relative aspect-square md:aspect-[4/5] bg-white overflow-hidden p-2" draggable="false">
          <img src="{{ product.thumbnail_url }}" alt="{{ product.name }}" 
              class="w-full h-full object-cover transition-transform duration-[2s] ease-out group-hover:scale-105" 
              draggable="false" loading="lazy" />
          
          <div class="absolute bottom-0 left-0 right-0 p-4 transform translate-y-full opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition-all duration-300 ease-out hidden md:block">
            <button onclick="event.preventDefault(); triggerQuickView(this);" 
                    data-id="{{ product.id }}"
                    data-slug="{{ product.slug }}"
                    data-name="{{ product.name }}"
                    data-price="{{ product.price }}"
                    data-image="{{ product.thumbnail_url }}"
                    data-category="{{ product.categories.name if product.categories else 'GUA Maison' }}"
                    data-stock="{{ product.stock_quantity | default(10) }}"
                    data-variants='{{ product.product_variants | tojson | safe if product.product_variants else "[]" }}'
                    class="w-full bg-white/95 backdrop-blur-sm border border-neutral-200 text-black py-3 text-[10px] uppercase tracking-[0.2em] font-black hover:bg-black hover:text-white transition-colors shadow-sm">
              Quick Add
            </button>
          </div>
        </a>

        <div class="p-4 md:p-6 flex justify-between items-start gap-4 flex-1">
          
          <div class="flex flex-col gap-1 w-full pr-2">
            <p class="text-[9px] font-bold text-black uppercase tracking-[0.1em]">
              {% if product.categories %}{{ product.categories.name }}{% else %}Core Collection{% endif %}
            </p>
            <a href="/product/{{ product.slug or product.id }}">
              <h3 class="text-[11px] font-black uppercase tracking-wider text-black hover:text-neutral-500 transition-colors line-clamp-2 mt-0.5 leading-snug">
                {{ product.name }}
              </h3>
            </a>
            <span class="text-[11px] font-medium text-neutral-600 mt-1">₫{{ "{:,.0f}".format(product.price) }}</span>
          </div>
          
          <button onclick="event.preventDefault(); toggleHeart('{{ product.id }}', this)" class="shrink-0 text-black hover:text-neutral-400 transition-colors mt-0.5 group/heart">
            <svg class="w-5 h-5 heart-icon transition-transform group-active/heart:scale-75" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" /></svg>
          </button>

        </div>
        
        <div class="px-4 pb-4 md:hidden mt-auto">
          <button onclick="event.preventDefault(); triggerQuickView(this);" 
                  data-id="{{ product.id }}"
                  data-slug="{{ product.slug }}"
                  data-name="{{ product.name }}"
                  data-price="{{ product.price }}"
                  data-image="{{ product.thumbnail_url }}"
                  data-category="{{ product.categories.name if product.categories else 'GUA Maison' }}"
                  data-stock="{{ product.stock_quantity | default(10) }}"
                  data-variants='{{ product.product_variants | tojson | safe if product.product_variants else "[]" }}'
                  class="w-full border border-neutral-200 py-2.5 text-[10px] uppercase tracking-[0.2em] font-black text-black hover:bg-black hover:text-white transition-colors">
            Thêm vào giỏ
          </button>
        </div>

      </div>
      {% endfor %}

    </div>
  </section>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const slider = document.getElementById('featured-slider');
      const btnPrev = document.getElementById('btnPrevFeatured');
      const btnNext = document.getElementById('btnNextFeatured');
      if (!slider) return;

      let isDown = false, startX, scrollLeft, isDragging = false;
      
      // Logic Kéo Thả
      slider.addEventListener('mousedown', (e) => {
        isDown = true; slider.classList.add('cursor-grabbing'); slider.classList.remove('cursor-grab', 'scroll-smooth');
        startX = e.pageX - slider.offsetLeft; scrollLeft = slider.scrollLeft;
      });
      slider.addEventListener('mouseleave', () => { isDown = false; slider.classList.remove('cursor-grabbing'); slider.classList.add('cursor-grab', 'scroll-smooth'); });
      slider.addEventListener('mouseup', () => { isDown = false; slider.classList.remove('cursor-grabbing'); slider.classList.add('cursor-grab', 'scroll-smooth'); setTimeout(() => { isDragging = false; }, 50);});
      slider.addEventListener('mousemove', (e) => {
        if (!isDown) return; e.preventDefault(); isDragging = true;
        const x = e.pageX - slider.offsetLeft;
        slider.scrollLeft = scrollLeft - (x - startX) * 2;
      });

      // Lăn chuột ngang
      slider.addEventListener('wheel', (e) => { if (e.deltaY !== 0) { e.preventDefault(); slider.scrollLeft += e.deltaY; } });
      
      // Fix click khi drag
      slider.querySelectorAll('a').forEach(link => { link.addEventListener('click', (e) => { if (isDragging) e.preventDefault(); }); });

      // Mũi tên điều hướng
      if (btnPrev && btnNext) {
        const scrollAmount = window.innerWidth * 0.5; // Trượt 50% màn hình mỗi lần bấm
        btnPrev.addEventListener('click', () => {
          slider.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
        });
        btnNext.addEventListener('click', () => {
          slider.scrollBy({ left: scrollAmount, behavior: 'smooth' });
        });
      }
    });
  </script>
