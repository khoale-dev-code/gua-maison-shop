{% extends "admin/admin_base.html" %}
{% block title %}Máy Bán Hàng Tại Quầy (POS) | GUA Admin{% endblock %}

{% block extra_head %}
<style>
  input[type=number]::-webkit-inner-spin-button, 
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
</style>
{% endblock %}

{% block content %}
<div class="min-h-screen bg-stone-50 pb-12 font-sans selection:bg-stone-900 selection:text-white">

  <!-- Header -->
  <div class="bg-white border-b border-stone-200 sticky top-0 z-30 shadow-sm">
    <div class="max-w-4xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 bg-stone-100 rounded-xl flex items-center justify-center text-stone-700 shadow-inner">
          <i class="fa-solid fa-cash-register text-xl"></i>
        </div>
        <div>
          <h1 class="text-xl font-black tracking-tight text-stone-900 uppercase">Hệ Thống POS</h1>
          <p class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest mt-0.5">
            <i class="fa-solid fa-circle text-[8px] mr-1 animate-pulse"></i>Online & Đồng bộ
          </p>
        </div>
      </div>
      <a href="{{ url_for('admin.reports') }}" 
         class="text-xs font-bold text-stone-500 hover:text-stone-900 bg-stone-100 hover:bg-stone-200 px-4 py-2.5 rounded-xl transition-colors flex items-center gap-2">
        <i class="fa-solid fa-arrow-left"></i> Quay lại Báo cáo
      </a>
    </div>
  </div>

  <div class="max-w-4xl mx-auto px-6 py-8">
    <div class="bg-white rounded-[2rem] shadow-xl border border-stone-100 overflow-visible flex flex-col md:flex-row">
      
      <!-- Cột Trái: Chọn sản phẩm -->
      <div class="flex-1 p-8 border-b md:border-b-0 md:border-r border-stone-100 bg-white relative">
        
        <!-- 1. Tìm Sản Phẩm -->
        <div class="mb-6">
          <label class="text-[11px] font-black text-stone-500 uppercase tracking-widest block mb-2.5">
            1. Tìm / Quét mã sản phẩm
          </label>
          <div class="relative" id="searchWrapper">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-stone-400 text-lg pointer-events-none z-10"></i>
            <input id="posSearch" type="text" placeholder="Nhập tên sản phẩm..." autocomplete="off"
              class="w-full pl-12 pr-10 py-4 border-2 border-stone-200 focus:border-stone-900 rounded-2xl text-base font-bold outline-none transition-colors"
              oninput="POSSystem.filterProducts()" onfocus="POSSystem.showDropdown()">
            <button id="posClearSearch" onclick="POSSystem.clearProduct()"
              class="absolute right-4 top-1/2 -translate-y-1/2 hidden text-stone-400 hover:text-stone-700 z-10">
              <i class="fa-solid fa-xmark text-lg"></i>
            </button>
          </div>

          <!-- Dropdown tìm kiếm -->
          <div id="posDropdown"
            class="hidden mt-2 border border-stone-200 rounded-2xl overflow-hidden shadow-xl bg-white z-50"
            style="max-height:300px; overflow-y:auto; position:absolute; width: calc(100% - 4rem);">
          </div>

          <!-- Chip Sản Phẩm Đã Chọn -->
          <div id="posSelectedChip"
            class="hidden mt-4 p-4 bg-stone-50 border-2 border-stone-900 rounded-2xl items-center gap-4 shadow-sm">
            <div class="w-14 h-14 bg-white border border-stone-200 rounded-xl flex items-center justify-center text-2xl flex-shrink-0">👕</div>
            <div class="flex-1 min-w-0">
              <p id="posChipName" class="text-base font-black text-stone-900 truncate"></p>
              <p id="posChipPrice" class="text-xs font-bold text-stone-500 mt-1"></p>
            </div>
            <div class="flex items-center gap-2 flex-shrink-0">
              <span id="posChipStock" class="text-xs font-black px-3 py-1.5 rounded-lg"></span>
              <button onclick="POSSystem.clearProduct()"
                class="w-8 h-8 rounded-full bg-stone-100 hover:bg-stone-200 flex items-center justify-center text-stone-600 transition-colors">
                <i class="fa-solid fa-xmark text-xs"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- 2. Chọn Phân Loại -->
        <div id="posVariantWrapper" class="hidden mb-6">
          <label class="text-[11px] font-black text-stone-500 uppercase tracking-widest block mb-2.5">
            2. Chọn Màu & Size
          </label>
          <div class="relative">
            <select id="posVariant" onchange="POSSystem.changeVariant()"
              class="w-full border-2 border-stone-200 focus:border-stone-900 rounded-2xl px-5 py-4 text-base font-bold outline-none transition-colors appearance-none bg-white cursor-pointer">
            </select>
            <i class="fa-solid fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-stone-400 pointer-events-none"></i>
          </div>
        </div>
      </div>

      <!-- Cột Phải: Thanh toán -->
      <div class="w-full md:w-[380px] bg-stone-50/50 p-8 flex flex-col justify-between">
        <div class="space-y-6">

          <!-- Số lượng -->
          <div>
            <label class="text-[11px] font-black text-stone-500 uppercase tracking-widest block mb-2.5">Số lượng</label>
            <div class="flex items-center border-2 border-stone-200 rounded-2xl overflow-hidden focus-within:border-stone-900 bg-white">
              <button type="button" onclick="POSSystem.adjustQty(-1)"
                class="w-14 h-14 bg-stone-50 hover:bg-stone-100 flex items-center justify-center text-stone-600 border-r border-stone-200 transition-colors">
                <i class="fa-solid fa-minus"></i>
              </button>
              <input id="posQty" type="number" value="1" min="1"
                class="flex-1 text-center text-xl font-black text-stone-900 border-none outline-none py-2 bg-transparent"
                oninput="POSSystem.calcTotal()">
              <button type="button" onclick="POSSystem.adjustQty(1)"
                class="w-14 h-14 bg-stone-50 hover:bg-stone-100 flex items-center justify-center text-stone-600 border-l border-stone-200 transition-colors">
                <i class="fa-solid fa-plus"></i>
              </button>
            </div>
          </div>

          <!-- Mã giảm giá -->
          <div>
            <label class="text-[11px] font-black text-rose-500 uppercase tracking-widest block mb-2.5">
              Áp dụng Khuyến mãi
            </label>
            <div class="relative">
              <select id="posCouponSelect" onchange="POSSystem.calcTotal()"
                class="w-full pl-10 pr-4 py-4 border-2 border-rose-200 focus:border-rose-500 rounded-2xl text-sm font-bold text-rose-600 bg-white cursor-pointer appearance-none outline-none">
                <option value="">-- Không áp dụng --</option>
                {% for c in coupons %}
                <option value="{{ c.id }}"
                  data-type="{{ c.discount_type }}"
                  data-value="{{ c.discount_value }}"
                  data-max="{{ c.max_discount or 0 }}"
                  data-min="{{ c.min_order_value or 0 }}">
                  {{ c.code }}
                  {% if c.discount_type == 'percent' %}(-{{ c.discount_value }}%){% else %}(-{{ '{:,.0f}'.format(c.discount_value) }}đ){% endif %}
                </option>
                {% endfor %}
              </select>
              <i class="fa-solid fa-ticket absolute left-4 top-1/2 -translate-y-1/2 text-rose-400 pointer-events-none"></i>
              <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-rose-300 text-[10px] pointer-events-none"></i>
            </div>
          </div>

          <!-- Cảnh báo -->
          <div id="posWarningContainer" class="hidden flex-col gap-3">
            <div id="posStockWarning" class="hidden px-4 py-3 rounded-xl text-xs font-bold flex items-center gap-2 shadow-sm"></div>
            <div id="posCouponWarning" class="hidden px-4 py-3 rounded-xl text-xs font-bold flex items-center gap-2 bg-amber-50 text-amber-700 border border-amber-200 shadow-sm"></div>
          </div>
        </div>

        <!-- Hóa đơn tính tiền -->
        <div class="mt-8">
          <div class="bg-white rounded-[1.5rem] border-2 border-stone-100 shadow-sm overflow-hidden mb-6">
            <div class="px-5 py-4 space-y-3 border-b border-stone-100">
              <div class="flex justify-between items-center">
                <span class="text-[11px] text-stone-500 font-bold uppercase tracking-widest">Tạm tính</span>
                <span id="bdSubtotal" class="text-sm font-black text-stone-900 tabular-nums">0 ₫</span>
              </div>
              <div class="flex justify-between items-center">
                <span class="text-[11px] text-rose-400 font-bold uppercase tracking-widest">Khuyến mãi</span>
                <span id="bdDiscount" class="text-sm font-black text-rose-500 tabular-nums">- 0 ₫</span>
              </div>
            </div>
            <div class="px-5 py-5 flex justify-between items-center bg-stone-50">
              <span class="text-xs font-black text-stone-900 uppercase tracking-widest">Thực Thu</span>
              <span id="bdTotal" class="text-3xl font-black text-emerald-600 tabular-nums">0 ₫</span>
            </div>
          </div>
          <button onclick="POSSystem.submit()" id="posSubmitBtn"
            class="w-full py-4 bg-stone-900 hover:bg-stone-800 active:scale-[0.98] text-white rounded-2xl text-sm font-black uppercase tracking-widest flex items-center justify-center gap-3 transition-all shadow-[0_10px_20px_-10px_rgba(28,25,23,0.5)]">
            <i class="fa-solid fa-print text-lg"></i>
            <span id="posSubmitLabel">THANH TOÁN & IN BILL</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="posToast"
  class="fixed bottom-6 right-6 z-[60] hidden items-center gap-3 px-5 py-4 rounded-2xl text-sm font-bold shadow-2xl transition-all">
  <i id="posToastIcon" class="fa-solid text-xl"></i>
  <span id="posToastMsg"></span>
</div>

<script id="products-data" type="application/json">{{ products | tojson | safe }}</script>

<script>
const POSSystem = {
  products: [],
  selected: null,
  selectedVariant: null,
  currentDiscount: 0,

  init: function () {
    try { this.products = JSON.parse(document.getElementById('products-data').textContent) || []; } catch (e) {}
    document.addEventListener('click', (e) => {
      const wrapper = document.getElementById('searchWrapper');
      const dropdown = document.getElementById('posDropdown');
      if (wrapper && !wrapper.contains(e.target)) dropdown.classList.add('hidden');
    });
  },

  resetForm: function () {
    this.selected = null;
    this.selectedVariant = null;
    this.currentDiscount = 0;
    document.getElementById('posSearch').value = '';
    document.getElementById('posQty').value = 1;
    document.getElementById('posCouponSelect').value = '';
    document.getElementById('posClearSearch').classList.add('hidden');
    document.getElementById('posDropdown').classList.add('hidden');
    document.getElementById('posSelectedChip').classList.add('hidden');
    document.getElementById('posVariantWrapper').classList.add('hidden');
    document.getElementById('posWarningContainer').classList.add('hidden');
    this.calcTotal();
  },

  showDropdown: function () {
    if (!this.selected) this.renderDropdown(document.getElementById('posSearch').value);
  },

  filterProducts: function () {
    if (this.selected) return;
    const kw = document.getElementById('posSearch').value.trim();
    document.getElementById('posClearSearch').classList.toggle('hidden', !kw);
    this.renderDropdown(kw);
  },

  renderDropdown: function (keyword) {
    const dropdown = document.getElementById('posDropdown');
    const filtered = this.products.filter(p => p.name.toLowerCase().includes(keyword.toLowerCase()));
    if (!filtered.length) {
      dropdown.innerHTML = `<div class="px-5 py-6 text-center text-xs font-bold text-stone-400 uppercase tracking-widest">Không tìm thấy sản phẩm</div>`;
      dropdown.classList.remove('hidden');
      return;
    }
    dropdown.innerHTML = filtered.map(p => {
      const stock = p.product_variants ? p.product_variants.reduce((s, v) => s + (v.stock || 0), 0) : (p.stock || 0);
      const badge = stock <= 0
        ? `<span class="text-[10px] font-black px-2 py-1 rounded-md bg-red-50 text-red-500 border border-red-100">Hết hàng</span>`
        : `<span class="text-[10px] font-black px-2 py-1 rounded-md bg-emerald-50 text-emerald-600 border border-emerald-100">Kho: ${stock}</span>`;
      return `<div onclick="${stock <= 0 ? '' : `POSSystem.selectProduct('${p.id}')`}"
        class="flex items-center gap-4 px-5 py-3.5 border-b border-stone-100 last:border-0
        ${stock <= 0 ? 'opacity-40 cursor-not-allowed' : 'hover:bg-stone-50 cursor-pointer transition-colors'}">
        <div class="w-10 h-10 bg-stone-100 rounded-xl flex items-center justify-center text-stone-400 flex-shrink-0">
          <i class="fa-solid fa-shirt text-sm"></i>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-black text-stone-900 truncate">${p.name}</p>
          <p class="text-[11px] font-bold text-stone-500 mt-0.5">${this.formatVND(p.price)}</p>
        </div>
        ${badge}
      </div>`;
    }).join('');
    dropdown.classList.remove('hidden');
  },

  selectProduct: function (id) {
    const p = this.products.find(x => String(x.id) === String(id));
    if (!p) return;
    this.selected = p;
    document.getElementById('posSearch').value = p.name;
    document.getElementById('posDropdown').classList.add('hidden');
    document.getElementById('posClearSearch').classList.remove('hidden');

    const variantWrapper = document.getElementById('posVariantWrapper');
    const variantSelect = document.getElementById('posVariant');
    if (p.product_variants && p.product_variants.length > 0) {
      let options = '<option value="">-- Chọn Màu sắc & Kích thước --</option>';
      p.product_variants.forEach(v => {
        const vStock = v.stock || 0;
        const vPrice = v.price_override || p.price;
        const disabled = vStock <= 0 ? 'disabled' : '';
        options += `<option value="${v.id}" data-price="${vPrice}" data-stock="${vStock}" ${disabled}>
          ${v.color_name} - Size ${v.size} ${vStock <= 0 ? '(Hết)' : `(Còn ${vStock})`} - ${this.formatVND(vPrice)}
        </option>`;
      });
      variantSelect.innerHTML = options;
      variantWrapper.classList.remove('hidden');
      const firstAvailable = p.product_variants.find(v => (v.stock || 0) > 0);
      if (firstAvailable) variantSelect.value = firstAvailable.id;
    } else {
      variantWrapper.classList.add('hidden');
    }
    this.changeVariant();
  },

  changeVariant: function () {
    const vSelect = document.getElementById('posVariant');
    const chip = document.getElementById('posSelectedChip');
    chip.classList.remove('hidden');
    chip.style.display = 'flex';

    if (!vSelect.value) {
      this.selectedVariant = null;
      document.getElementById('posChipName').textContent = this.selected.name;
      document.getElementById('posChipPrice').textContent = 'Vui lòng chọn phân loại';
      document.getElementById('posChipStock').className = 'hidden';
      this.calcTotal();
      return;
    }

    const opt = vSelect.options[vSelect.selectedIndex];
    this.selectedVariant = {
      id: vSelect.value,
      price: parseFloat(opt.getAttribute('data-price')) || this.selected.price,
      stock: parseInt(opt.getAttribute('data-stock')) || 0,
      label: opt.text.split(' (')[0]
    };

    document.getElementById('posChipName').textContent = `${this.selected.name} (${this.selectedVariant.label})`;
    document.getElementById('posChipPrice').textContent = this.formatVND(this.selectedVariant.price) + ' / sản phẩm';

    const stockEl = document.getElementById('posChipStock');
    stockEl.textContent = `Kho: ${this.selectedVariant.stock}`;
    stockEl.className = this.selectedVariant.stock <= 5
      ? 'text-[10px] font-black px-2.5 py-1.5 rounded-md bg-amber-50 text-amber-600 border border-amber-200'
      : 'text-[10px] font-black px-2.5 py-1.5 rounded-md bg-emerald-50 text-emerald-600 border border-emerald-200';

    document.getElementById('posQty').value = 1;
    document.getElementById('posQty').max = this.selectedVariant.stock;
    this.calcTotal();
  },

  clearProduct: function () {
    this.resetForm();
    document.getElementById('posSearch').focus();
  },

  adjustQty: function (delta) {
    const el = document.getElementById('posQty');
    const max = this.selectedVariant ? this.selectedVariant.stock : (this.selected ? this.selected.stock : 999);
    el.value = Math.max(1, Math.min((parseInt(el.value) || 1) + delta, max));
    this.calcTotal();
  },

  calcTotal: function () {
    const qty = Math.max(1, parseInt(document.getElementById('posQty').value) || 1);
    const price = this.selectedVariant ? this.selectedVariant.price : (this.selected ? this.selected.price : 0);
    const subtotal = price * qty;

    const couponSelect = document.getElementById('posCouponSelect');
    const opt = couponSelect.options[couponSelect.selectedIndex];
    const couponWarningEl = document.getElementById('posCouponWarning');

    let discount = 0;
    couponWarningEl.classList.add('hidden');

    if (couponSelect.value && subtotal > 0) {
      const type = opt.getAttribute('data-type');
      const value = parseFloat(opt.getAttribute('data-value')) || 0;
      const maxDiscount = parseFloat(opt.getAttribute('data-max')) || 0;
      const minOrder = parseFloat(opt.getAttribute('data-min')) || 0;

      if (subtotal < minOrder) {
        couponWarningEl.classList.remove('hidden');
        couponWarningEl.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> Mã cần đơn tối thiểu ${this.formatVND(minOrder)}!`;
      } else {
        if (type === 'percent') {
          discount = subtotal * (value / 100);
          if (maxDiscount > 0 && discount > maxDiscount) discount = maxDiscount;
        } else { discount = value; }
        if (discount > subtotal) discount = subtotal;
      }
    }

    this.currentDiscount = discount;
    const total = Math.max(0, subtotal - discount);

    document.getElementById('bdSubtotal').textContent = this.formatVND(subtotal);
    document.getElementById('bdDiscount').textContent = '- ' + this.formatVND(discount);
    document.getElementById('bdTotal').textContent = this.formatVND(total);

    const stockWarningEl = document.getElementById('posStockWarning');
    const currentStock = this.selectedVariant ? this.selectedVariant.stock : 0;

    if (this.selectedVariant && qty > currentStock) {
      stockWarningEl.classList.remove('hidden');
      stockWarningEl.className = 'px-4 py-3 rounded-xl text-xs font-bold flex items-center gap-2 bg-red-50 text-red-600 border border-red-200 shadow-sm';
      stockWarningEl.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> Vượt tồn kho! Chỉ còn ${currentStock} cái.`;
    } else if (this.selectedVariant && currentStock <= 5) {
      stockWarningEl.classList.remove('hidden');
      stockWarningEl.className = 'px-4 py-3 rounded-xl text-xs font-bold flex items-center gap-2 bg-amber-50 text-amber-700 border border-amber-200 shadow-sm';
      stockWarningEl.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> Chú ý: Sắp hết (Kho: ${currentStock}).`;
    } else {
      stockWarningEl.classList.add('hidden');
    }

    const warningContainer = document.getElementById('posWarningContainer');
    if (!stockWarningEl.classList.contains('hidden') || !couponWarningEl.classList.contains('hidden')) {
      warningContainer.classList.remove('hidden');
      warningContainer.style.display = 'flex';
    } else {
      warningContainer.classList.add('hidden');
    }
  },

  submit: async function () {
    if (!this.selected) { this.showToast('Vui lòng chọn sản phẩm!', false); return; }
    if (this.selected.product_variants && this.selected.product_variants.length > 0 && !this.selectedVariant) {
      this.showToast('Vui lòng chọn Màu & Size!', false); return;
    }

    const qty = Math.max(1, parseInt(document.getElementById('posQty').value) || 1);
    const price = this.selectedVariant ? this.selectedVariant.price : this.selected.price;
    const revenue = Math.max(0, (price * qty) - this.currentDiscount);
    const currentStock = this.selectedVariant ? this.selectedVariant.stock : 0;

    if (qty > currentStock) { this.showToast(`Hết hàng! Kho chỉ còn: ${currentStock}`, false); return; }

    const btn = document.getElementById('posSubmitBtn');
    const label = document.getElementById('posSubmitLabel');
    btn.disabled = true;
    btn.classList.add('opacity-60');
    label.textContent = 'Hệ thống đang xử lý...';

    try {
      const res = await fetch('/admin/reports/pos-order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token() }}' },
        body: JSON.stringify({
          product_id: this.selected.id,
          variant_id: this.selectedVariant ? this.selectedVariant.id : '',
          quantity: qty,
          discount: this.currentDiscount,
          revenue: revenue
        })
      });
      const result = await res.json();

      if (result.success) {
        this.printReceipt(result.invoice);
        this.showToast('Giao dịch POS thành công!', true);
        setTimeout(() => this.resetForm(), 2000);
      } else {
        this.showToast('Lỗi: ' + result.message, false);
      }
    } catch (e) {
      this.showToast('Lỗi kết nối máy chủ.', false);
    } finally {
      btn.disabled = false;
      btn.classList.remove('opacity-60');
      label.textContent = 'THANH TOÁN & IN BILL';
    }
  },

  printReceipt: function (inv) {
    const html = `<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&display=swap');
      @page { margin: 0; }
      body { font-family: 'Inconsolata', 'Courier New', monospace; width: 72mm; margin: 0 auto; color: #000; font-size: 13px; padding: 10mm 4mm; line-height: 1.4; }
      .text-center { text-align: center; } .font-bold { font-weight: 700; } .flex { display: flex; justify-content: space-between; }
      .divider { border-bottom: 1px dashed #000; margin: 8px 0; } .divider-thick { border-bottom: 2px solid #000; margin: 10px 0; }
      .store-name { font-size: 24px; font-weight: 700; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
      .store-info { font-size: 11px; margin-bottom: 2px; }
      .meta-info { font-size: 12px; margin-bottom: 10px; } .meta-info div { display: flex; justify-content: space-between; margin-bottom: 2px; }
      .item-name { font-weight: 700; font-size: 12px; margin-bottom: 3px; text-transform: uppercase; } .item-calc { font-size: 12px; margin-bottom: 6px; }
      .summary-line { font-size: 12px; margin-bottom: 4px; } .total-line { font-size: 18px; font-weight: 700; margin: 8px 0; text-transform: uppercase; }
      .footer-text { font-size: 11px; text-align: center; margin-top: 15px; }
    </style></head><body>
      <div class="text-center">
        <div class="store-name">GUA MAISON</div>
        <div class="store-info">123 Nguyễn Trãi, Quận 1, TP.HCM</div>
        <div class="store-info">Hotline: 0909 123 456</div>
      </div>
      <div class="divider"></div>
      <div class="text-center font-bold" style="font-size: 16px; margin: 8px 0;">HÓA ĐƠN THANH TOÁN</div>
      <div class="meta-info">
        <div><span>Mã đơn:</span> <span class="font-bold">${inv.order_code}</span></div>
        <div><span>Ngày in:</span> <span>${inv.date}</span></div>
        <div><span>Thu ngân:</span> <span>Admin</span></div>
      </div>
      <div class="divider-thick"></div>
      <div class="item-name">${inv.product_name}</div>
      <div class="flex item-calc">
        <span>${inv.quantity} x ${inv.original_price.toLocaleString('vi-VN')}</span>
        <span>${(inv.quantity * inv.original_price).toLocaleString('vi-VN')}</span>
      </div>
      <div class="divider"></div>
      <div class="flex summary-line"><span>Tạm tính:</span><span>${(inv.quantity * inv.original_price).toLocaleString('vi-VN')}</span></div>
      ${inv.discount > 0 ? `<div class="flex summary-line"><span>Giảm giá:</span><span>- ${inv.discount.toLocaleString('vi-VN')}</span></div>` : ''}
      <div class="divider-thick"></div>
      <div class="flex total-line"><span>THỰC THU:</span><span>${inv.total.toLocaleString('vi-VN')} ₫</span></div>
      <div class="flex summary-line" style="margin-top: 8px;"><span>Thanh toán:</span><span>Tại quầy / Bank</span></div>
      <div class="divider"></div>
      <div class="footer-text">
        <p class="font-bold" style="font-size: 13px;">CẢM ƠN QUÝ KHÁCH & HẸN GẶP LẠI!</p>
        <p style="font-size: 10px; margin-top: 8px; font-style: italic;">* Đổi trả trong 7 ngày với hóa đơn và tem mác nguyên vẹn.</p>
      </div>
      <script>window.onload = function() { window.print(); setTimeout(function() { window.close(); }, 500); }<\/script>
    </body></html>`;
    const w = window.open('', '_blank', 'width=400,height=700');
    w.document.open(); w.document.write(html); w.document.close();
  },

  showToast: function (msg, success) {
    const t = document.getElementById('posToast');
    t.className = `fixed bottom-6 right-6 z-[60] flex items-center gap-3 px-5 py-4 rounded-2xl text-sm font-bold shadow-2xl transition-all ${success ? 'bg-stone-900 text-white' : 'bg-red-600 text-white'}`;
    document.getElementById('posToastIcon').className = `fa-solid ${success ? 'fa-circle-check text-emerald-400' : 'fa-circle-xmark text-white'}`;
    document.getElementById('posToastMsg').textContent = msg;
    t.classList.remove('hidden');
    setTimeout(() => t.classList.add('hidden'), 3500);
  },

  formatVND: function (n) { return Number(n || 0).toLocaleString('vi-VN') + ' ₫'; }
};

document.addEventListener('DOMContentLoaded', () => POSSystem.init());
</script>
