{% extends "base.html" %}
{% block title %}Quên mật khẩu | GUA Maison{% endblock %}

{% block content %}
<section class="reveal min-h-screen bg-[#f7f4ef] px-4 flex items-center justify-center pt-20">
  
  <div class="w-full max-w-[440px] bg-[#fbfaf8] border border-stone-300 p-8 sm:p-12 shadow-[0_22px_70px_rgba(20,18,14,0.1)] relative">
    <div class="absolute left-0 top-0 h-full w-2 bg-stone-950"></div>

    <div class="mb-8 text-center sm:text-left">
      <p class="mb-3 text-[10px] font-extrabold uppercase tracking-[0.36em] text-[#9d7b3f]">Khôi phục tài khoản</p>
      <h2 class="font-display text-3xl font-semibold leading-none text-stone-950 sm:text-4xl">Quên mật khẩu</h2>
      <p class="mt-4 text-xs sm:text-sm leading-relaxed text-stone-500">
        Đừng lo lắng, hãy nhập email bạn đã đăng ký. GUA sẽ gửi cho bạn đường dẫn để tạo mật khẩu mới.
      </p>
    </div>

    <form action="{{ url_for('auth.forgot_password') }}" method="POST" class="space-y-6">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div>
        <label for="email" class="mb-2 block text-[10px] font-extrabold uppercase tracking-[0.22em] text-stone-700">Email của bạn</label>
        <div class="relative">
          <span class="pointer-events-none absolute inset-y-0 left-0 flex w-12 items-center justify-center border-r border-stone-300 text-stone-400">
            <i class="fa-regular fa-envelope"></i>
          </span>
          <input type="email" id="email" name="email" required placeholder="you@example.com"
                 class="h-12 w-full border border-stone-300 bg-white pl-16 pr-4 text-sm font-semibold text-stone-900 outline-none transition-all placeholder:text-stone-400 focus:border-stone-950 focus:shadow-[0_0_0_4px_rgba(12,10,9,0.06)]" />
        </div>
      </div>

      <button type="submit" class="group flex h-14 w-full items-center justify-center gap-3 bg-stone-950 px-5 text-[11px] font-extrabold uppercase tracking-[0.24em] text-white shadow-[0_14px_34px_rgba(12,10,9,0.24)] transition-all hover:bg-[#2a251d] active:scale-[0.98]">
        Gửi liên kết khôi phục
        <svg class="h-4 w-4 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3"/></svg>
      </button>
    </form>

    <div class="mt-8 border-t border-stone-200 pt-5 text-center">
      <a href="{{ url_for('auth.login') }}" class="text-[12px] font-extrabold text-stone-500 uppercase tracking-widest transition-colors hover:text-stone-950 flex items-center justify-center gap-2">
        <i class="fa-solid fa-arrow-left"></i> Trở về đăng nhập
      </a>
    </div>
  </div>
</section>

<style>
  .reveal { opacity: 0; animation: revealUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  @keyframes revealUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
{% endblock %}
