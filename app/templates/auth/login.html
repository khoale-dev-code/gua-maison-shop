{% extends "base.html" %}
{% block title %}Đăng nhập | GUA{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center bg-stone-50 py-12 px-4 sm:px-6 lg:px-8 reveal">
  
  <div class="max-w-[420px] w-full bg-white rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-stone-100 p-8 sm:p-10 relative overflow-hidden">
    
    <div class="absolute -top-10 -right-10 w-32 h-32 bg-stone-50 rounded-full blur-2xl pointer-events-none"></div>

    <div class="text-center mb-10 relative z-10">
      <h1 class="text-2xl sm:text-3xl font-bold text-stone-900 tracking-tight mb-2">Đăng nhập</h1>
      <p class="text-sm text-stone-500">Truy cập vào không gian lưu trữ GUA.</p>
    </div>

    <form action="/auth/login" method="POST" class="space-y-5 relative z-10">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div>
        <label for="email" class="block text-xs font-semibold text-stone-600 mb-1.5 uppercase tracking-wider">
          Email
        </label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
            <svg class="w-4 h-4 text-stone-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zm0 0c0 1.657 1.007 3 2.25 3S21 13.657 21 12a9 9 0 10-2.636 6.364M16.5 12V8.25"/></svg>
          </div>
          <input type="email" id="email" name="email" required
                 placeholder="Nhập địa chỉ email"
                 class="w-full text-sm text-stone-800 border border-stone-200 rounded-lg pl-10 pr-4 py-3
                        placeholder:text-stone-400 outline-none focus:border-stone-400 focus:ring-1 focus:ring-stone-400 transition-all bg-stone-50/50 focus:bg-white" />
        </div>
      </div>

      <div>
        <div class="flex items-center justify-between mb-1.5">
          <label for="password" class="block text-xs font-semibold text-stone-600 uppercase tracking-wider">
            Mật khẩu
          </label>
          <a href="#" class="text-xs font-medium text-stone-500 hover:text-stone-900 transition-colors">
            Quên mật khẩu?
          </a>
        </div>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
            <svg class="w-4 h-4 text-stone-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
          </div>
          <input type="password" id="password" name="password" required
                 placeholder="••••••••"
                 class="w-full text-sm text-stone-800 border border-stone-200 rounded-lg pl-10 pr-4 py-3
                        placeholder:text-stone-400 outline-none focus:border-stone-400 focus:ring-1 focus:ring-stone-400 transition-all bg-stone-50/50 focus:bg-white" />
        </div>
      </div>

      <div class="pt-3">
        <button type="submit"
                class="w-full bg-stone-900 text-white text-sm font-semibold px-4 py-3 rounded-lg
                       hover:bg-stone-700 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 group shadow-md shadow-stone-200">
          Truy cập
          <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
        </button>
      </div>
    </form>

    <div class="mt-8 pt-6 border-t border-stone-100 text-center relative z-10">
      <p class="text-sm text-stone-500">
        Chưa có tài khoản?
        <a href="/auth/register" class="font-semibold text-stone-900 hover:text-stone-600 hover:underline underline-offset-4 transition-all ml-1">
          Đăng ký ngay
        </a>
      </p>
    </div>

  </div>
</div>
{% endblock %}
