{% extends "base.html" %}
{% block title %}Đặt lại mật khẩu | GUA Maison{% endblock %}

{% block content %}
<section class="reveal min-h-screen bg-[#f7f4ef] px-4 flex items-center justify-center pt-20">
  
  <div class="w-full max-w-[440px] bg-[#fbfaf8] border border-stone-300 p-8 sm:p-12 shadow-[0_22px_70px_rgba(20,18,14,0.1)] relative">
    <div class="absolute left-0 top-0 h-full w-2 bg-stone-950"></div>

    <div class="mb-8 text-center sm:text-left">
      <p class="mb-3 text-[10px] font-extrabold uppercase tracking-[0.36em] text-[#9d7b3f]">GUA Account</p>
      <h2 class="font-display text-3xl font-semibold leading-none text-stone-950 sm:text-4xl">Tạo mật khẩu mới</h2>
      <p class="mt-4 text-xs sm:text-sm leading-relaxed text-stone-500">
        Hãy thiết lập mật khẩu mới (tối thiểu 8 ký tự) để bảo vệ tài khoản của bạn.
      </p>
    </div>

    <form action="{{ url_for('auth.reset_password', token=token) }}" method="POST" class="space-y-5">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div>
        <label for="password" class="mb-2 block text-[10px] font-extrabold uppercase tracking-[0.22em] text-stone-700">Mật khẩu mới</label>
        <div class="relative">
          <span class="pointer-events-none absolute inset-y-0 left-0 flex w-12 items-center justify-center border-r border-stone-300 text-stone-400">
            <i class="fa-solid fa-lock"></i>
          </span>
          <input type="password" id="password" name="password" required minlength="8" placeholder="Nhập mật khẩu mới"
                 class="h-12 w-full border border-stone-300 bg-white pl-16 pr-12 text-sm font-semibold text-stone-900 outline-none transition-all placeholder:text-stone-400 focus:border-stone-950 focus:shadow-[0_0_0_4px_rgba(12,10,9,0.06)]" />
          <button type="button" onclick="togglePassword('password', 'eye-pwd')" 
                  class="absolute inset-y-0 right-0 flex w-12 items-center justify-center text-stone-400 hover:text-stone-900 transition-colors focus:outline-none">
            <i id="eye-pwd" class="fa-regular fa-eye"></i>
          </button>
        </div>
      </div>

      <div>
        <label for="confirm_password" class="mb-2 block text-[10px] font-extrabold uppercase tracking-[0.22em] text-stone-700">Xác nhận mật khẩu</label>
        <div class="relative">
          <span class="pointer-events-none absolute inset-y-0 left-0 flex w-12 items-center justify-center border-r border-stone-300 text-stone-400">
            <i class="fa-solid fa-shield-check"></i>
          </span>
          <input type="password" id="confirm_password" name="confirm_password" required minlength="8" placeholder="Nhập lại mật khẩu mới"
                 class="h-12 w-full border border-stone-300 bg-white pl-16 pr-12 text-sm font-semibold text-stone-900 outline-none transition-all placeholder:text-stone-400 focus:border-stone-950 focus:shadow-[0_0_0_4px_rgba(12,10,9,0.06)]" />
          <button type="button" onclick="togglePassword('confirm_password', 'eye-cpwd')" 
                  class="absolute inset-y-0 right-0 flex w-12 items-center justify-center text-stone-400 hover:text-stone-900 transition-colors focus:outline-none">
            <i id="eye-cpwd" class="fa-regular fa-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="group flex h-14 w-full items-center justify-center gap-3 bg-stone-950 px-5 text-[11px] font-extrabold uppercase tracking-[0.24em] text-white shadow-[0_14px_34px_rgba(12,10,9,0.24)] transition-all hover:bg-[#2a251d] active:scale-[0.98] mt-2">
        Cập nhật mật khẩu
        <i class="fa-solid fa-check transition-transform group-hover:scale-125"></i>
      </button>
    </form>
  </div>
</section>

<script>
  function togglePassword(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (input.type === 'password') {
      input.type = 'text';
      icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
      input.type = 'password';
      icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
  }
</script>
<style>
  .reveal { opacity: 0; animation: revealUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  @keyframes revealUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
{% endblock %}
